<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kyomei</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1f2128;
    --panel-2: #262932;
    --border: #34384a;
    --text: #f2f2f5;
    --muted: #9a9db0;
    --accent: #5b8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a.link-card {
    display: block;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-decoration: none;
    color: var(--text);
  }
  a.link-card:hover { border-color: var(--accent); }
  a.link-card .label { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  a.link-card .desc { font-size: 14px; color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>kyomei</h1>
    <div class="subtitle">Choose a page.</div>
    <div class="links">
      <a class="link-card" href="kyomei-admin.html">
        <div class="label">Staff</div>
        <div class="desc">Create and run sessions</div>
      </a>
      <a class="link-card" href="kyomei-display.html">
        <div class="label">Display</div>
        <div class="desc">Project live results</div>
      </a>
      <a class="link-card" href="kyomei.html">
        <div class="label">Student</div>
        <div class="desc">Submit a response</div>
      </a>
    </div>
  </div>
</body>
</html>
